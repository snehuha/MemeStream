<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Meme Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="site-header">
  <h1>MemeStream</h1>
  <p>A random meme generator</p>
</div>
    <div class="container">
    <div class="loader"></div>
        <div class="meme">
            <button class="theme-toggle">🌙</button>
            <img src="" alt="Random Meme">
            <div class="overlay">
                <p class="title"> </p>
            </div>
        </div>
        
        <p class="hint">Hover over the meme to pause</p>
    </div>
    <button class="download">Download Meme</button>
    <script src="script.js"></script>
</body>

</html>
